<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>巴别塔 - 联机模式</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; user-select: none; }
        .panel { background: #1a1a1a; border: 2px solid #a6e3e9; border-radius: 10px; padding: 20px; max-width: 600px; margin: 20px auto; position: relative; }
        button { background: #a6e3e9; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; margin: 5px; transition: 0.2s; }
        button:hover { background: #85c1c7; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        input { padding: 10px; border: 1px solid #a6e3e9; border-radius: 5px; background: #000; color: #fff; text-align: center; margin: 5px 0; width: 80%; }
        
        /* 战场专有 UI */
        #battlefield, #rematch-modal { display: none; }
        .hand { display: flex; justify-content: center; gap: 10px; margin: 15px 0; min-height: 130px; }
        .card { width: 90px; height: 130px; background: #2c3e50; border: 2px solid #a6e3e9; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 13px; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease; box-sizing: border-box; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(166,227,233,0.3); }
        .enemy-card { border-color: #ff4757; cursor: default; background: #3a1c1e; }
        .enemy-card:hover { transform: none; box-shadow: none; }
        .card-title { font-weight: bold; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        
        .hp-bar { width: 100%; background: #333; height: 15px; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s; }
        .enemy-hp-fill { background: #ff4757; }
        .player-hp-fill { background: #00ff88; }
        
        #timer { font-size: 28px; font-weight: bold; margin: 10px 0; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        #logs { height: 120px; overflow-y: auto; background: #000; border: 1px solid #444; padding: 10px; font-size: 13px; text-align: left; border-radius: 5px; }
        
        /* 结算弹窗 */
        #rematch-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; border-radius: 10px; }
    </style>
</head>
<body>

    <button onclick="window.location.href='index.html'" style="position:absolute; top:20px; left:20px; background:#444; color:#fff;">&lt; 离开联机</button>

    <div id="lobby" class="panel">
        <h2 style="color: #a6e3e9;">联机终端</h2>
        <input type="text" id="my-name" placeholder="输入你的临时昵称..." value="探求者">
        <br><br>
        <button onclick="initHost()" id="btn-host">生成并作为房主</button>
        <p>我的 ID: <span id="my-id" style="color:#00ff88; cursor:pointer;">等待生成...</span></p>
        <hr style="border-color:#444; margin:20px 0;">
        <input type="text" id="opp-id" placeholder="粘贴对方的 ID...">
        <button onclick="connectToHost()" id="btn-join">连接对手</button>
        <p id="status-msg" style="color:#ffd700; font-weight:bold;"></p>
    </div>

    <div id="battlefield" class="panel">
        <div id="rematch-modal">
            <h2 id="result-title">游戏结束</h2>
            <p id="result-desc"></p>
            <div>
                <button id="btn-rematch" onclick="requestRematch()">再来一把</button>
                <button onclick="window.location.href='index.html'" style="background:#444; color:#fff;">退出联机</button>
            </div>
            <p id="rematch-status" style="color:#a6e3e9; font-size:12px; margin-top:10px;"></p>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <h3 id="enemy-name" style="color:#ff4757; margin:0;">对手</h3>
            <span style="font-size:14px;">HP: <span id="enemy-hp-text">30.0</span>/30</span>
        </div>
        <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill enemy-hp-fill"></div></div>
        
        <div id="enemy-hand" class="hand"></div> <div id="timer">--</div>
        
        <div id="logs"></div>
        
        <div id="player-hand" class="hand"></div> <div class="hp-bar"><div id="player-hp-fill" class="hp-fill player-hp-fill"></div></div>
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <h3 id="my-display-name" style="color:#00ff88; margin:0;">我</h3>
            <span style="font-size:14px;">HP: <span id="player-hp-text">30.0</span>/30</span>
        </div>
    </div>

<script>
// =============================
// 1. 核心卡牌数据库 (增强版)
// =============================
const cardDB = [
    { id: 'education', name: '教育', desc: '1.0伤害，下次伤害额外连击一次相同数值。' },
    { id: 'creation', name: '创造', desc: '2.0伤害，下次受击减伤1.0。' },
    { id: 'research', name: '研究', desc: '累计使用3次爆发10.0伤害(限1次)。' },
    { id: 'combat', name: '战斗', desc: '造成 3.0 伤害。' },
    { id: 'crime', name: '犯罪', desc: '4.0伤害，下次受击额外增加1.0。' },
    { id: 'study', name: '学习', desc: '1.0伤害，免疫下次伤害且下次增伤1.0(一次性)。', once: true },
    { id: 'pleasure', name: '享乐', desc: '恢复 4.0 生命 (一次性)。', once: true },
    { id: 'rule', name: '统治', desc: '1.0伤害，跳过对方下回合 (一次性)。', once: true },
    { id: 'faith', name: '信仰', desc: '【被动】若被发到此牌，初始生命翻倍。', passive: true },
    { id: 'service', name: '服务', desc: '后续4回合，每回合造成1.0额外伤害。' }
];

let peer = null, conn = null;
let isHost = false, isMyTurn = false;
let turnTimer = null, timeLeft = 30;
let playCount = 0;

// 初始状态
let me = { hp: 30, maxHp: 30, hand: [], name: "探求者", researchCount: 0, hasBurst: false, effects: {}, serviceTurns: 0 };
let opp = { hp: 30, maxHp: 30, hand: [], name: "对手", researchCount: 0, hasBurst: false, effects: {}, serviceTurns: 0 };

// =============================
// 2. 逻辑工具函数
// =============================

// 发牌去重逻辑
function getUniqueHand() {
    let hand = [];
    while(hand.length < 3) {
        let card = {...cardDB[Math.floor(Math.random() * cardDB.length)]};
        if(!hand.find(c => c.id === card.id)) hand.push(card);
    }
    return hand;
}

// 被动技能：信仰检测
function checkFaith(player) {
    if (player.hand.find(c => c.id === 'faith')) {
        player.maxHp = 60;
        player.hp = 60;
    } else {
        player.maxHp = 30;
        player.hp = 30;
    }
}

// =============================
// 3. 游戏流程控制
// =============================

function initGameData() {
    me.hand = getUniqueHand();
    opp.hand = getUniqueHand();
    
    checkFaith(me);
    checkFaith(opp);
    
    isMyTurn = Math.random() > 0.5;
    conn.send({
        type: 'START_GAME',
        oppName: me.name,
        yourHand: opp.hand,
        oppHand: me.hand,
        isYourTurn: !isMyTurn,
        myMaxHp: me.maxHp,
        oppMaxHp: opp.maxHp
    });
    enterBattlefield();
}

function handleData(data) {
    if (data.type === 'HANDSHAKE') {
        opp.name = data.name;
        if (isHost) setTimeout(initGameData, 1000);
    } else if (data.type === 'START_GAME') {
        opp.name = data.oppName;
        me.hand = data.yourHand;
        opp.hand = data.oppHand;
        me.maxHp = data.myMaxHp; me.hp = data.myMaxHp;
        opp.maxHp = data.oppMaxHp; opp.hp = data.oppMaxHp;
        isMyTurn = data.isYourTurn;
        enterBattlefield();
    } else if (data.type === 'PLAY_CARD') {
        applyCardEffect(data.cardId, opp, me, data.cardIndex);
    } else if (data.type === 'REDEAL') {
        me.hand = data.yourHand;
        opp.hand = data.oppHand;
        isMyTurn = data.isYourTurn;
        playCount = 0;
        log("========= 新轮次：手牌已重组 =========", "#a6e3e9");
        renderHands();
        updateHPUI();
        startTimer();
    }
}

// =============================
// 4. 战斗指令与效果结算
// =============================

function playCard(index) {
    if (!isMyTurn || me.hp <= 0) return;
    const card = me.hand[index];
    if (card.passive) { log("【信仰】为被动牌，无法主动点击", "#888"); return; }
    if (card.used) return;

    isMyTurn = false;
    clearInterval(turnTimer);

    // 处理一次性卡牌
    if (card.once) card.used = true;

    // 视觉特效
    const el = document.getElementById(`player-card-${index}`);
    el.style.transform = "translateY(-20px)";
    setTimeout(() => { el.style.transform = ""; renderHands(); }, 300);

    conn.send({ type: 'PLAY_CARD', cardId: card.id, cardIndex: index });
    applyCardEffect(card.id, me, opp, index);
}

function applyCardEffect(cardId, caster, target, index) {
    let damage = 0;
    let logColor = (caster === me) ? "#00ff88" : "#ff4757";
    const card = cardDB.find(c => c.id === cardId);
    log(`${caster.name} 使用了 【${card.name}】`, logColor);

    // 1. 基础数值结算
    switch(cardId) {
        case 'education': damage = 1.0; caster.effects.doubleNext = true; break;
        case 'creation': damage = 2.0; caster.effects.reduceNext = 1.0; break;
        case 'combat': damage = 3.0; break;
        case 'crime': damage = 4.0; caster.effects.vulnerable = true; break;
        case 'study': 
            damage = 1.0; 
            caster.effects.immune = true; 
            caster.effects.buffNext = 1.0; 
            break;
        case 'pleasure': caster.hp = Math.min(caster.maxHp, caster.hp + 4.0); break;
        case 'rule': damage = 1.0; target.effects.skipped = true; break;
        case 'service': caster.serviceTurns = 4; break;
        case 'research':
            caster.researchCount++;
            if(caster.researchCount >= 3 && !caster.hasBurst) {
                damage = 10.0;
                caster.hasBurst = true;
                log(`🔥 【研究】爆发！造成10点巨额伤害！`, "#ffd700");
            }
            break;
    }

    // 2. 伤害加成结算 (Buffs)
    if (damage > 0) {
        if (caster.effects.buffNext) { damage += caster.effects.buffNext; caster.effects.buffNext = 0; }
        if (caster.effects.doubleNext) { damage *= 2; caster.effects.doubleNext = false; }
        
        // 3. 目标减伤与免疫 (Debuffs)
        if (target.effects.immune) {
            damage = 0;
            target.effects.immune = false;
            log(`🛡️ ${target.name} 免疫了本次伤害！`, "#a6e3e9");
        }
        if (target.effects.reduceNext) {
            damage = Math.max(0, damage - target.effects.reduceNext);
            target.effects.reduceNext = 0;
        }
        if (target.effects.vulnerable) {
            damage += 1.0;
            target.effects.vulnerable = false;
        }
        
        target.hp -= damage;
    }

    // 4. 服务牌持续伤害判定
    if (caster.serviceTurns > 0) {
        target.hp -= 1.0;
        caster.serviceTurns--;
        log(`✨ 【服务】额外造成1.0点伤害 (剩${caster.serviceTurns}轮)`, "#ffd700");
    }

    // 5. 判定回合结束
    if (target.effects.skipped) {
        target.effects.skipped = false;
        log(`🚫 ${target.name} 回合被跳过！`, "#ff4757");
        if (caster === me) isMyTurn = true; 
    } else {
        if (caster === me) isMyTurn = false;
        else isMyTurn = true;
    }

    updateHPUI();
    checkGameEnd();
    if (me.hp > 0 && opp.hp > 0) startTimer();
}

// =============================
// 5. UI 渲染 (支持一次性卡牌置灰)
// =============================

function renderHands() {
    const eDiv = document.getElementById('enemy-hand');
    eDiv.innerHTML = '';
    opp.hand.forEach((c, i) => {
        // 对方如果是被动牌或已使用，视觉区分
        const isOff = c.passive || c.used;
        eDiv.innerHTML += `<div class="card enemy-card" id="enemy-card-${i}" style="opacity:${isOff?0.5:1}">
            <div class="card-title">${c.name}</div><div>${c.desc}</div>
        </div>`;
    });

    const pDiv = document.getElementById('player-hand');
    pDiv.innerHTML = '';
    me.hand.forEach((c, i) => {
        const isOff = c.passive || c.used;
        const div = document.createElement('div');
        div.className = 'card';
        div.id = `player-card-${i}`;
        div.style.opacity = isOff ? "0.4" : "1";
        div.style.cursor = isOff ? "not-allowed" : "pointer";
        div.innerHTML = `<div class="card-title">${c.name}</div><div>${c.desc}</div>`;
        if(!isOff) div.onclick = () => playCard(i);
        pDiv.appendChild(div);
    });
}

// 倒计时逻辑
function startTimer() {
    clearInterval(turnTimer);
    if (me.hp <= 0 || opp.hp <= 0) return;
    timeLeft = 30;
    const tDiv = document.getElementById('timer');
    
    if (!isMyTurn) {
        tDiv.innerText = "等待对手...";
        return;
    }

    turnTimer = setInterval(() => {
        tDiv.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(turnTimer);
            // 随机出一张可用牌
            const validIndices = me.hand.map((c,i) => (!c.passive && !c.used)?i:null).filter(v => v!==null);
            if(validIndices.length > 0) {
                playCard(validIndices[Math.floor(Math.random()*validIndices.length)]);
            } else {
                // 如果实在没牌出（特殊情况），强制切回合
                isMyTurn = false;
                conn.send({ type: 'PLAY_CARD', cardId: 'research', cardIndex: 0 }); // 发个空研究占位
                startTimer();
            }
        }
        timeLeft--;
    }, 1000);
}

// 每三回合重洗 (房主控制)
function checkGameEnd() {
    if (me.hp <= 0 || opp.hp <= 0) {
        clearInterval(turnTimer);
        const win = me.hp > 0;
        document.getElementById('rematch-modal').style.display = 'flex';
        document.getElementById('result-title').innerText = win ? "胜利" : "败北";
        return;
    }

    playCount++;
    if (playCount >= 6 && isHost) {
        me.hand = getUniqueHand();
        opp.hand = getUniqueHand();
        // 重洗时，信仰再次判定（如果新发到了信仰，血量上限会变，但这里按常理通常保持当前血量）
        isMyTurn = true;
        conn.send({ type: 'REDEAL', yourHand: opp.hand, oppHand: me.hand, isYourTurn: false });
        playCount = 0;
        renderHands();
    }
}
// (其余UI更新与网络初始化函数保持不变...)

    startTimer();
}

// =============================
// 4. 再来一把
// =============================
function requestRematch() {
    rematchState.me = true;
    document.getElementById('btn-rematch').innerText = "已发送请求...";
    document.getElementById('btn-rematch').disabled = true;
    conn.send({ type: 'REMATCH_REQ' });
    checkRematch();
}

function checkRematch() {
    if (rematchState.me && rematchState.opp) {
        if (isHost) initGameData();
    }
}
</script>
</body>
</html>
